<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CySec Guardians | Individual Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- CoreUI CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/css/coreui.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <!-- <link href="/assets/css/custom.css" rel="stylesheet"> -->
</head>

<body>

<div class="wrapper d-flex">

  <!-- Sidebar -->
  <aside class="sidebar sidebar-dark sidebar-fixed" id="sidebar">
    <div class="sidebar-brand d-none d-md-flex">
      <strong>CySec</strong>Guardians
    </div>

    <ul class="sidebar-nav">
      <li class="nav-item">
        <a class="nav-link active" href="/individual/">Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Training & Awareness</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Threat Exposure</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Cyber Tips</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Settings</a>
      </li>
    </ul>
  </aside>

  <!-- Main content -->
  <div class="body flex-grow-1">

    <main class="container-fluid p-4">

      <h3 class="mb-4">Welcome back 👋</h3>

      <!-- KPI Cards -->
      <div class="row g-4">

        <div class="col-12 col-sm-6 col-xl-3">
          <div class="card h-100">
            <div class="card-body">
              <div class="text-medium-emphasis mb-1">Awareness Score</div>
              <h3 class="fw-bold">78%</h3>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
          <div class="card h-100">
            <div class="card-body">
              <div class="text-medium-emphasis mb-1">Courses Completed</div>
              <h3 class="fw-bold">6</h3>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
          <div class="card h-100">
            <div class="card-body">
              <div class="text-medium-emphasis mb-1">Certificates</div>
              <h3 class="fw-bold">2</h3>
            </div>
          </div>
        </div>

        <div class="col-12 col-sm-6 col-xl-3">
          <div class="card h-100">
            <div class="card-body">
              <div class="text-medium-emphasis mb-1">Exposure Alerts</div>
              <h3 class="fw-bold">1</h3>
            </div>
          </div>
        </div>

      </div>

    </main>
  </div>
</div>

<!-- CoreUI JS -->
<script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/js/coreui.bundle.min.js"></script>

</body>
</html>
