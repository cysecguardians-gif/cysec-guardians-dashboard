<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>CySec Guardians | Individual Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- CoreUI CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/css/coreui.min.css" rel="stylesheet">

  <!-- Custom CSS -->
  <link href="/assets/css/custom.css" rel="stylesheet">
</head>

<body class="c-app">

<div class="wrapper d-flex">

  <!-- Sidebar -->
  <div class="sidebar sidebar-dark sidebar-fixed" id="sidebar">
    <div class="sidebar-brand d-md-down-none">
      <strong>CySec</strong>Guardians
    </div>

    <ul class="sidebar-nav">
      <li class="nav-item">
        <a class="nav-link active" href="/individual/">
          Dashboard
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">
          Training & Awareness
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">
          Threat Exposure
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">
          Cyber Tips
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">
          Settings
        </a>
      </li>
    </ul>
  </div>

  <!-- Main -->
  <div class="body flex-grow-1 px-3">
    <div class="container-lg">

      <h3 class="mb-4">Welcome back 👋</h3>

      <!-- KPI Cards -->
      <div class="row">
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <div class="text-medium-emphasis">Awareness Score</div>
              <h4>78%</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <div class="text-medium-emphasis">Courses Completed</div>
              <h4>6</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <div class="text-medium-emphasis">Certificates</div>
              <h4>2</h4>
            </div>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card">
            <div class="card-body">
              <div class="text-medium-emphasis">Exposure Alerts</div>
              <h4>1</h4>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- CoreUI JS -->
<script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/js/coreui.bundle.min.js"></script>

</body>
</html>
