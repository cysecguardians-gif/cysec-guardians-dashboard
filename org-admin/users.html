<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Organization Users</title>

  <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/css/coreui.min.css" rel="stylesheet">
  <link href="/assets/css/custom.css" rel="stylesheet">
</head>

<body>

<div class="wrapper">

  <!-- Sidebar -->
  <div class="sidebar sidebar-dark sidebar-fixed" id="sidebar">
    <div class="sidebar-brand d-none d-md-flex">
      <h4 class="text-white mb-0">CySec Guardians</h4>
    </div>

    <ul class="sidebar-nav d-flex flex-column h-100">
      <li class="nav-item"><a class="nav-link" href="/org-admin/index.html">Dashboard</a></li>
      <li class="nav-item"><a class="nav-link active" href="/org-admin/users.html">Users</a></li>
      <li class="nav-item"><a class="nav-link" href="/org-admin/trainings.html">Trainings</a></li>
      <li class="nav-item"><a class="nav-link" href="/org-admin/phishing.html">Phishing Simulation</a></li>
      <li class="nav-item"><a class="nav-link" href="/org-admin/reports.html">Reports</a></li>
      <li class="nav-item"><a class="nav-link" href="/org-admin/settings.html">Settings</a></li>

      <li class="nav-item mt-auto">
        <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
      </li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="d-flex flex-column min-vh-100 bg-light">

    <header class="header header-sticky px-3">
      <div class="container-fluid">
        <h5 class="mb-0">Organization Users</h5>
      </div>
    </header>

    <main class="body flex-grow-1 px-3">
      <div class="container-lg">

        <div class="d-flex justify-content-between align-items-center my-4">
          <h2 class="mb-0">Organization Users</h2>
          <button class="btn btn-primary" id="btnAddUser">Add User</button>
        </div>

        <div class="card">
          <div class="card-body table-responsive">
            <table class="table table-bordered table-hover align-middle">
              <thead class="table-light">
                <tr>
                  <th>Name</th>
                  <th>Email</th>
                  <th>Department</th>
                </tr>
              </thead>
              <tbody id="usersTable">
                <tr>
                  <td colspan="3" class="text-center">Loading users...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<!-- Add User Modal -->
<div class="modal fade" id="addUserModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Add Employee</h5>

      <input type="text" id="name" class="form-control mb-2" placeholder="Name">
      <input type="email" id="email" class="form-control mb-2" placeholder="Email">
      <input type="text" id="dept" class="form-control mb-3" placeholder="Department">

      <button class="btn btn-success" id="submitUser">Add</button>
    </div>
  </div>
</div>

<!-- CoreUI -->
<script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/js/coreui.bundle.min.js"></script>

<script src="/assets/js/layout.js"></script>
<script type="module">

import { apiFetch } from "/assets/js/api.js";

/* ===============================
   Modal
=============================== */

const modalEl = document.getElementById('addUserModal');
const addUserModal = new coreui.Modal(modalEl);

document.getElementById("btnAddUser")
  .addEventListener("click", () => addUserModal.show());

/* ===============================
   Render Users
=============================== */

function renderUsers(users) {
  const table = document.getElementById("usersTable");
  table.innerHTML = "";

  if (!users.length) {
    table.innerHTML =
      `<tr><td colspan="3" class="text-center">No users found</td></tr>`;
    return;
  }

  users.forEach(u => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${u.name || ""}</td>
      <td>${u.email || ""}</td>
      <td>${u.department || ""}</td>
    `;
    table.appendChild(row);
  });
}

/* ===============================
   Load Users
=============================== */

async function loadUsers() {
  try {
    const me = await apiFetch("/me");
    const users = await apiFetch(`/employees?org_id=${me.org_id}`);
    renderUsers(users);

  } catch (err) {
    console.error(err);
    document.getElementById("usersTable").innerHTML =
      `<tr><td colspan="3" class="text-danger text-center">
        Failed to load users
      </td></tr>`;
  }
}

/* ===============================
   Add User
=============================== */

async function addUser() {
  try {
    const me = await apiFetch("/me");

    await apiFetch("/employees", {
      method: "POST",
      body: JSON.stringify({
        org_id: me.org_id,
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        department: document.getElementById("dept").value
      })
    });

    addUserModal.hide();
    loadUsers();

  } catch (err) {
    console.error("Add user failed", err);
  }
}

document.getElementById("submitUser")
  .addEventListener("click", addUser);

loadUsers();

</script>

</body>
</html>
