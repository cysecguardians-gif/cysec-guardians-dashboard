<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Manage Users</title>

  <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/css/coreui.min.css" rel="stylesheet">
  <link href="/assets/css/custom.css" rel="stylesheet">
</head>
<script src="/assets/js/layout.js"></script>
<body class="body">
  <div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar sidebar-dark sidebar-fixed" id="sidebar">
      <div class="sidebar-brand d-none d-md-flex">
        <h4 class="text-white">CySec Guardians</h4>
      </div>

      <ul class="sidebar-nav">
        <li class="nav-item"><a class="nav-link" href="/org-admin/index.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" href="/org-admin/users.html">Users</a></li>
        <li class="nav-item"><a class="nav-link" href="/org-admin/trainings.html">Trainings</a></li>
        <li class="nav-item"><a class="nav-link" href="/org-admin/phishing.html">Phishing Simulation</a></li>
        <li class="nav-item"><a class="nav-link" href="/org-admin/reports.html">Reports</a></li>
        <li class="nav-item"><a class="nav-link" href="/org-admin/settings.html">Settings</a></li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="container-fluid p-4">

      <h2 class="mb-3">Organization Users</h2>

<button class="btn btn-primary mb-3" data-coreui-toggle="modal" data-coreui-target="#addUserModal">
  Add User
</button>

      <div class="card">
        <div class="card-body table-responsive">
          <table class="table table-bordered table-hover">
            <thead class="table-light">
              <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
              </tr>
            </thead>
            <tbody id="usersTableBody"></tbody>
          </table>
        </div>
      </div>

    </div>
  </div>

  <!-- Add User Modal -->
  <div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Add Employee</h5>
          <button type="button" class="btn-close" data-coreui-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label>Name</label>
            <input type="text" id="empName" class="form-control">
          </div>
          <div class="mb-3">
            <label>Email</label>
            <input type="email" id="empEmail" class="form-control">
          </div>
          <div class="mb-3">
            <label>Department</label>
            <input type="text" id="empDept" class="form-control">
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-primary" onclick="addEmployee()">Add</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/js/coreui.bundle.min.js"></script>
  <script src="/assets/js/api.js"></script>

  <script>
    async function getOrgContext() {
      const res = await apiGet("/me");
      localStorage.setItem("org_id", res.org_id);
      localStorage.setItem("role", res.role);
      return res.org_id;
    }

    async function loadEmployees() {
      const org_id = await getOrgContext();
      const employees = await apiGet(`/employees?org_id=${org_id}`);

      const table = document.getElementById("usersTableBody");
      table.innerHTML = "";

      employees.forEach(emp => {
        const row = `
          <tr>
            <td>${emp.name}</td>
            <td>${emp.email}</td>
            <td>${emp.department || ""}</td>
          </tr>
        `;
        table.innerHTML += row;
      });
    }

    async function addEmployee() {
      const name = document.getElementById("empName").value;
      const email = document.getElementById("empEmail").value;
      const dept = document.getElementById("empDept").value;

      const org_id = localStorage.getItem("org_id");

      await apiPost("/employees", {
        org_id: org_id,
        name: name,
        email: email,
        department: dept
      });

      location.reload();
    }

    loadEmployees();
  </script>

</body>
</html>
