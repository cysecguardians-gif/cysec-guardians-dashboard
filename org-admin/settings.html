<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Organization Settings</title>

<!-- CoreUI CSS -->
<link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/css/coreui.min.css" rel="stylesheet">
<link href="/assets/css/custom.css" rel="stylesheet">
</head>

<body>

<div class="wrapper">

  <!-- Sidebar -->
  <div class="sidebar sidebar-dark sidebar-fixed" id="sidebar">
    <div class="sidebar-brand d-none d-md-flex">
      <h4 class="text-white mb-0">CySec Guardians</h4>
    </div>

    <ul class="sidebar-nav d-flex flex-column h-100">
      <li class="nav-item">
        <a class="nav-link" href="/org-admin/index.html">Dashboard</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="/org-admin/users.html">Users</a>
      </li>

      <!-- REQUIRED for layout.js -->
      <li class="nav-item" id="menu-training">
        <a class="nav-link" href="/org-admin/trainings.html">Trainings</a>
      </li>

      <!-- REQUIRED for layout.js -->
      <li class="nav-item" id="menu-phishing">
        <a class="nav-link" href="/org-admin/phishing.html">Phishing Simulation</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="/org-admin/reports.html">Reports</a>
      </li>

      <li class="nav-item">
        <a class="nav-link active" href="/org-admin/settings.html">Settings</a>
      </li>

      <li class="nav-item mt-auto">
        <a class="nav-link text-danger" href="#" onclick="logout()">Logout</a>
      </li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="d-flex flex-column min-vh-100 bg-light">

    <header class="header header-sticky px-3">
      <div class="container-fluid">
        <h5 class="mb-0">Organization Settings</h5>
      </div>
    </header>

    <main class="body flex-grow-1 px-3">
      <div class="container-lg">

        <div class="d-flex justify-content-between align-items-center my-4">
          <h2 class="mb-0">Organization Settings</h2>
          <button class="btn btn-primary" id="saveSettingsBtn">
            Save Changes
          </button>
        </div>

        <!-- Organization Info -->
        <div class="card mb-4">
          <div class="card-body">
            <h5>Organization Information</h5>

            <div class="mb-3">
              <label class="form-label">Organization Name</label>
              <input id="orgName" type="text" class="form-control" placeholder="Loading...">
            </div>

            <div class="mb-3">
              <label class="form-label">Admin Email</label>
              <input id="adminEmail" type="email" class="form-control" placeholder="Loading...">
            </div>
          </div>
        </div>

        <!-- Notification -->
        <div class="card mb-4">
          <div class="card-body">
            <h5>Notification Preferences</h5>

            <div class="form-check mb-2">
              <input class="form-check-input" id="notifyPhishing" type="checkbox">
              <label class="form-check-label">
                Phishing campaign alerts
              </label>
            </div>

            <div class="form-check">
              <input class="form-check-input" id="notifyTraining" type="checkbox">
              <label class="form-check-label">
                Training completion summaries
              </label>
            </div>
          </div>
        </div>

        <!-- Security -->
        <div class="card">
          <div class="card-body">
            <h5>Security</h5>
            <button class="btn btn-warning" id="changePasswordBtn">
              Change Password
            </button>
          </div>
        </div>

      </div>
    </main>

  </div>
</div>

<!-- CoreUI -->
<script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/js/coreui.bundle.min.js"></script>

<!-- Global Layout -->
<script src="/assets/js/layout.js"></script>

<!-- PAGE CONTROLLER -->
<script type="module" src="/assets/js/pages/settings.js"></script>

</body>
</html>
