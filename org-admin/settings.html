<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Settings</title>

  <!-- CoreUI CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/css/coreui.min.css" rel="stylesheet">
  <link href="/assets/css/custom.css" rel="stylesheet">
</head>

<body class="body">
  <div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar sidebar-dark sidebar-fixed" id="sidebar">
      <div class="sidebar-brand d-none d-md-flex">
        <h4 class="text-white">CySec Guardians</h4>
      </div>

      <ul class="sidebar-nav">
        <li class="nav-item">
          <a class="nav-link" href="/org-admin/index.html">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/org-admin/users.html">Users</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/org-admin/trainings.html">Trainings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/org-admin/phishing.html">Phishing Simulation</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/org-admin/reports.html">Reports</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/org-admin/settings.html">Settings</a>
        </li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="container-fluid p-4">

      <h2 class="mb-4">Organization Settings</h2>

      <!-- Organization Info -->
      <div class="card mb-4">
        <div class="card-body">
          <h5>Organization Information</h5>
          <div class="mb-3">
            <label class="form-label">Organization Name</label>
            <input type="text" class="form-control" value="ABC Financial Services Pvt Ltd">
          </div>
          <div class="mb-3">
            <label class="form-label">Admin Email</label>
            <input type="email" class="form-control" value="admin@company.com">
          </div>
        </div>
      </div>

      <!-- Notification Preferences -->
      <div class="card mb-4">
        <div class="card-body">
          <h5>Notification Preferences</h5>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" checked>
            <label class="form-check-label">Phishing campaign alerts</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" checked>
            <label class="form-check-label">Training completion summaries</label>
          </div>
        </div>
      </div>

      <!-- Security -->
      <div class="card">
        <div class="card-body">
          <h5>Security</h5>
          <button class="btn btn-warning">Change Password</button>
        </div>
      </div>

    </div>
  </div>

  <!-- CoreUI JS -->
  <script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/js/coreui.bundle.min.js"></script>
</body>
</html>
