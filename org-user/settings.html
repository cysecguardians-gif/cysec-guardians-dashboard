<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Settings</title>

  <!-- CoreUI CSS -->
  <link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.4.3/dist/css/coreui.min.css" rel="stylesheet">
  <link href="/assets/css/custom.css" rel="stylesheet">
</head>

<body class="body">
  <div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar sidebar-dark sidebar-fixed" id="sidebar">
      <div class="sidebar-brand d-none d-md-flex">
        <h4 class="text-white">CySec Guardians</h4>
      </div>

      <ul class="sidebar-nav">
        <li class="nav-item">
          <a class="nav-link" href="/org-user/index.html">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/org-user/training.html">Trainings</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/org-user/cyber-tips.html">Cyber Tips</a>
        </li>
        <li class="nav-item">
          <a class="nav-link active" href="/org-user/settings.html">Settings</a>
        </li>
      </ul>
    </div>

    <!-- Main Content -->
    <div class="container-fluid p-4">

      <h2 class="mb-4">Profile & Notification Settings</h2>

      <div class="card mb-4">
        <div class="card-body">
          <h5>Email Notifications</h5>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" checked>
            <label class="form-check-label">Training reminders</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" checked>
            <label class="form-check-label">New training announcements</label>
          </div>
        </div>
      </div>

      <div class="card mb-4">
        <div class="card-body">
          <h5>Profile Settings</h5>
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" value="John Doe">
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" value="john.doe@company.com">
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-body">
          <h5>Security</h5>
          <button class="btn btn-warning">Change Password</button>
        </div>
      </div>

    </div>
  </div>
