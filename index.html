<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <script>
    const host = window.location.hostname;

    if (host.startsWith("admin.")) {
      window.location.href = "/login.html";
    }
    else if (host.startsWith("app.")) {
      window.location.href = "/login.html";
    }
    else if (host.startsWith("user.")) {
      window.location.href = "/login.html";
    }
    else {
      // fallback (should never happen)
      window.location.href = "/login.html";
    }
  </script>
</head>
<body></body>
</html>
